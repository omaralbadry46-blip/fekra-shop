<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول المشرف | Fekra Shop</title>
  <link rel="icon" type="image/png" href="files/fekra shop (64 x 64 px).png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="login-body">

  <!-- Noscript Warning -->
  <noscript>
    <style>
      /* Hide all elements inside the body when JS is disabled */
      body > *:not(noscript) {
        display: none !important;
      }
      /* Show only the noscript warning container */
      .noscript-warning {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #000000;
        color: #ffffff;
        font-family: 'Cairo', sans-serif;
        text-align: center;
        padding: 20px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 99999;
      }
      .noscript-logo {
        width: 120px;
        margin-bottom: 24px;
      }
      .noscript-title {
        color: #eeba2c;
        font-size: 1.8rem;
        margin-bottom: 12px;
      }
      .noscript-desc {
        color: #b3b3b3;
        font-size: 1.1rem;
        max-width: 500px;
        line-height: 1.6;
      }
    </style>
    <div class="noscript-warning">
      <img src="files/fekra shop (500 x 500 px).png" alt="Fekra Shop" class="noscript-logo">
      <h2 class="noscript-title">يرجى تفعيل جافا سكريبت</h2>
      <p class="noscript-desc">هذه الصفحة تعتمد بشكل كامل على JavaScript لتسجيل الدخول والتحقق من الأمان. يرجى تفعيل جافا سكريبت في إعدادات متصفحك للوصول إليها.</p>
    </div>
  </noscript>

  <div class="login-card">
    <a href="index.html">
      <img src="files/fekra shop (500 x 500 px).png" alt="لوجو فكرة شوب" class="login-logo">
    </a>
    
    <h1 class="login-title">تسجيل دخول المسؤول</h1>
    
    <div id="login-error-msg" style="color: #ff4d4d; font-size: 0.9rem; margin-bottom: 15px; display: none;"></div>
    
    <form id="login-form">
      <div class="form-group" style="text-align: right;">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control" placeholder="admin@fekra.com" required style="direction: ltr; text-align: left;">
      </div>

      <div class="form-group" style="text-align: right;">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required style="direction: ltr; text-align: left;">
      </div>

      <button type="submit" class="btn btn-primary login-btn" id="btn-login-submit">
        <span>تسجيل الدخول</span>
      </button>
    </form>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { showToast } from './js/cart-helper.js';

    const loginForm = document.getElementById('login-form');
    const submitBtn = document.getElementById('btn-login-submit');
    const errorEl = document.getElementById('login-error-msg');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      errorEl.style.display = 'none';
      submitBtn.innerHTML = '<span>جاري التحقق...</span>';
      submitBtn.disabled = true;

      try {
        // Try Firebase Authentication
        await signInWithEmailAndPassword(auth, email, password);
        
        // Logged in successfully
        localStorage.setItem('fekra_admin_auth', 'firebase_session');
        window.location.href = 'admin.html';
      } catch (error) {
        console.error("Firebase authentication error:", error.code || error.message);
        errorEl.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
        errorEl.style.display = 'block';
        submitBtn.innerHTML = '<span>تسجيل الدخول</span>';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
