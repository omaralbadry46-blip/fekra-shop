<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول المشرف | Fekra Shop</title>
  <link rel="icon" type="image/png" href="files/fekra shop (64 x 64 px).png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="login-body">

  <div class="login-card">
    <a href="index.html">
      <img src="files/fekra shop (500 x 500 px).png" alt="لوجو فكرة شوب" class="login-logo">
    </a>
    
    <h1 class="login-title">تسجيل دخول المسؤول</h1>
    
    <div id="login-error-msg" style="color: #ff4d4d; font-size: 0.9rem; margin-bottom: 15px; display: none;"></div>
    
    <form id="login-form">
      <div class="form-group" style="text-align: right;">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control" placeholder="admin@fekra.com" required style="direction: ltr; text-align: left;">
      </div>

      <div class="form-group" style="text-align: right;">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required style="direction: ltr; text-align: left;">
      </div>

      <button type="submit" class="btn btn-primary login-btn" id="btn-login-submit">
        <span>تسجيل الدخول</span>
      </button>
    </form>

    <div style="margin-top: 25px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;">
      وضع التجربة السريع (بدون فايربيز):<br>
      الحساب: <span style="font-family:var(--font-english); color:var(--text-gray);">admin@fekra.com</span><br>
      الرمز: <span style="font-family:var(--font-english); color:var(--text-gray);">admin123</span>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { showToast } from './js/cart-helper.js';

    const loginForm = document.getElementById('login-form');
    const submitBtn = document.getElementById('btn-login-submit');
    const errorEl = document.getElementById('login-error-msg');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      errorEl.style.display = 'none';
      submitBtn.innerHTML = '<span>جاري التحقق...</span>';
      submitBtn.disabled = true;

      try {
        // Try Firebase Authentication
        await signInWithEmailAndPassword(auth, email, password);
        
        // Logged in successfully
        localStorage.setItem('fekra_admin_auth', 'firebase_session');
        window.location.href = 'admin.html';
      } catch (error) {
        console.warn("Firebase authentication error:", error.code || error.message);
        
        // Failover Developer Mode for instant presentation
        if (email === 'admin@fekra.com' && password === 'admin123') {
          console.log("Developer Mode authorized via credentials.");
          localStorage.setItem('fekra_admin_auth', 'developer_session');
          window.location.href = 'admin.html';
        } else {
          // Display actual error to the administrator
          errorEl.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
          errorEl.style.display = 'block';
          submitBtn.innerHTML = '<span>تسجيل الدخول</span>';
          submitBtn.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
